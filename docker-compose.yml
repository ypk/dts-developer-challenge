name: "dts-developer-challenge"

services:
  app:
    build:
      target: development
    env_file:
      - .env.development
    volumes:
      - ./:/app
      - /app/node_modules
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${PORT}
      - DATABASE_URL=${DATABASE_URL}
      - SHADOW_DATABASE_URL=${SHADOW_DATABASE_URL}
    command: npm run dev
    depends_on:
      seed:
        condition: service_completed_successfully

  migrate:
    build:
      target: development
    env_file:
      - .env.development
    command: npm run prisma:dev:migrate
    environment:
      - NODE_ENV=${NODE_ENV}
      - DATABASE_URL=${DATABASE_URL}
    depends_on:
      db:
        condition: service_healthy

  seed:
    build:
      target: development
    env_file:
      - .env.development
    command: npm run prisma:dev:seed
    environment:
      - NODE_ENV=${NODE_ENV}
      - PORT=${POSTGRES_PORT}
      - DATABASE_URL=${DATABASE_URL}
      - SHADOW_DATABASE_URL=${SHADOW_DATABASE_URL}
    depends_on:
      migrate:
        condition: service_completed_successfully

  db:
    image: postgres:17.1-alpine
    env_file:
      - .env.development
    ports:
      - "${POSTGRES_PORT}:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
